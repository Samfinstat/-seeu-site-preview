<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>SeeU — личный помощник</title>
</head>
<body>
  <script>window.SEEU_PAGE_B64 = '';</script>
  <script src="page-chunks/index.part1.js"></script>
  <script src="page-chunks/index.part2.js"></script>
  <script src="page-chunks/index.part3.js"></script>
  <script>
    const binary = atob(window.SEEU_PAGE_B64);
    const bytes = Uint8Array.from(binary, char => char.charCodeAt(0));
    const html = new TextDecoder('utf-8').decode(bytes);
    document.open();
    document.write(html);
    document.close();
  </script>
</body>
</html>
